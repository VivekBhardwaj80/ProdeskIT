<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash-Flow</title>
    <link rel="stylesheet" href="/Cash-Flow/style.css">
</head>

<body>
    <h1>Cash-Flow Tracker</h1>

    <!-- Salary Input -->
    <div>
        <label>Total Salary</label>
        <input type="number" id="salary" placeholder="Enter your salary">
    </div>

    <!-- Expense Name Input -->
    <div>
        <label>Expense Name</label>
        <input type="text" id="expenseName" placeholder="Enter expense name">
    </div>

    <!-- Expense Amount Input -->
    <div>
        <label>Expense Amount</label>
        <input type="number" id="expenseAmount" placeholder="Enter expense amount">
    </div>

    <!-- Button -->
    <button id="addExpenseBtn">
        Add Expense
    </button>

    <!-- Output Area -->
    <div id="expenseList"></div>
    <div id="balance"></div>
</body>
<script src="script.js"></script>
</html>
